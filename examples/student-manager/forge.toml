[project]
name = "student-manager"
forge_version = "0.1.0"

# Dataset IDs are assigned at load time — run `forge dataset load` to populate
# [[datasets]]
# id = "..."
# name = "students_raw"
# path = "..."

[[pipelines]]
id = "aaaaaaaa-0000-0000-0000-000000000001"
display_name = "student_pipeline"
module = "pipelines.student_pipeline"
function = "run"

[[models]]
class_name = "Student"
mode = "snapshot"
module = "models.student"

[[models]]
class_name = "Grade"
mode = "snapshot"
module = "models.grade"

[[endpoint_repos]]
module = "endpoint_repos.student_endpoints"

[[apps]]
name = "student-manager"
path = "./apps/student-manager"

[[apps]]
name = "analytics"
path = "./apps/analytics"
