[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "forge-framework"
version = "0.1.22"
description = "A layered data application development framework"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "duckdb>=0.10",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "pydantic>=2.7",
    "apscheduler>=3.10",
    "jinja2>=3.1",
    "tomli>=2.0; python_version < '3.11'",
    "httpx>=0.27",
    "rich>=13.7",
    "gitpython>=3.1",
    "packaging>=24.0",
    "pyarrow>=16.0",
    "pandas>=2.2",
]

[project.scripts]
forge = "forge.cli.main:cli"

[tool.hatch.build.targets.wheel]
packages = ["forge"]
