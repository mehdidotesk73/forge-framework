[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "forge-suite"
version = "0.1.35"
description = "Forge framework + management UI — single installable package. After installing, run: forge-suite quickstart"
requires-python = ">=3.11"
dependencies = [
    "forge-framework==0.1.35",
]

[project.scripts]
forge-suite = "forge_suite.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["forge_suite"]

[tool.hatch.build.targets.wheel.force-include]
"forge_suite/webapp_dist" = "forge_suite/webapp_dist"
